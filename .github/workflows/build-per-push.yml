name: Build Per Push

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

env:
  PYTHON_VERSION: "3.11"
  NUITKA_VERSION: "2.6.6"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            suffix: ".exe"
            platform: "win"
          - os: ubuntu-latest
            suffix: ""
            platform: "linux"
          - os: macos-latest
            suffix: ""
            platform: "macos"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libffi-dev \
            libssl-dev \
            python3-dev \
            zlib1g-dev

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install openssl@3

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install nuitka==${{ env.NUITKA_VERSION }}
          pip install -r requirements.txt
          pip install selenium-stealth ordered-set zstandard

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Build with Nuitka (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          python -m nuitka `
            --standalone `
            --onefile `
            --output-filename=TaoBaoGoods-PerPush-${{ matrix.platform }}${{ matrix.suffix }} `
            --output-dir=dist `
            --windows-console-mode=force `
            --lto=yes `
            --jobs=auto `
            --assume-yes-for-downloads `
            main.py

      - name: Build with Nuitka (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --output-filename=TaoBaoGoods-PerPush-${{ matrix.platform }}${{ matrix.suffix }} \
            --output-dir=dist \
            --lto=yes \
            --jobs=auto \
            --assume-yes-for-downloads \
            main.py

      - name: Build with Nuitka (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --output-filename=TaoBaoGoods-PerPush-${{ matrix.platform }}${{ matrix.suffix }} \
            --output-dir=dist \
            --macos-create-Universal-Binary=no \
            --lto=yes \
            --jobs=auto \
            --assume-yes-for-downloads \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaoBaoGoods-PerPush-${{ matrix.platform }}
          path: dist/TaoBaoGoods-PerPush-${{ matrix.platform }}${{ matrix.suffix }}
          retention-days: 7
