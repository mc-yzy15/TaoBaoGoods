name: Build Per Push

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

env:
  PYTHON_VERSION: "3.11"

jobs:
  build:
    environment: GITHUB_TOKEN
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            suffix: ".exe"
          - os: ubuntu-latest
            suffix: ""
          - os: macos-latest
            suffix: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          pip install -r requirements.txt

      - name: Install dependencies (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          pip install -r requirements.txt

      - name: Run unit tests
        shell: bash
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v

      - name: Export platform name
        id: platform
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            echo "NAME=win" >> "$GITHUB_OUTPUT"
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            echo "NAME=linux" >> "$GITHUB_OUTPUT"
          else
            echo "NAME=macos" >> "$GITHUB_OUTPUT"
          fi

      - name: Build with nuitka standalone (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          python -m nuitka `
            --standalone `
            --onefile `
            --output-filename=TaoBaoGoods-PerPush-${{ steps.platform.outputs.NAME }}${{ matrix.suffix }} `
            --output-dir=dist `
            main.py

      - name: Build with nuitka standalone (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --output-filename=TaoBaoGoods-PerPush-${{ steps.platform.outputs.NAME }}${{ matrix.suffix }} \
            --output-dir=dist \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaoBaoGoods-PerPush-${{ steps.platform.outputs.NAME }}
          path: dist/TaoBaoGoods-PerPush-${{ steps.platform.outputs.NAME }}${{ matrix.suffix }}
          retention-days: 7
