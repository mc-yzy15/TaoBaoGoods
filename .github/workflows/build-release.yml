name: Build Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      debug:
        description: "Debug mode (skip tests)"
        required: false
        default: false
        type: boolean
      platforms:
        description: "Platforms to build (all/win/linux/macos)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - win
          - linux
          - macos

env:
  PYTHON_VERSION: "3.11"
  NUITKA_VERSION: "2.6.6"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            suffix: ".exe"
            platform: "win"
            arch: "x64"

          - os: ubuntu-latest
            suffix: ""
            platform: "linux"
            arch: "x86_64"

          - os: macos-13
            suffix: ""
            platform: "macos"
            arch: "x86_64"

          - os: macos-latest
            suffix: ""
            platform: "macos"
            arch: "arm64"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Get pip cache dir
        id: pip-cache
        shell: bash
        run: echo "dir=$(pip cache dir)" >> "$GITHUB_OUTPUT"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pip-cache.outputs.dir }}
          key: ${{ runner.os }}-${{ matrix.arch }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-pip-

      - name: Install system dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          choco install upx -y

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libffi-dev \
            libssl-dev \
            python3-dev \
            zlib1g-dev \
            upx-ucl

      - name: Install system dependencies (macOS)
        if: matrix.platform == 'macos'
        run: brew install openssl@3

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install nuitka==${{ env.NUITKA_VERSION }}
          pip install -r requirements.txt
          pip install selenium-stealth ordered-set zstandard

      - name: Run unit tests
        if: github.event.inputs.debug != 'true'
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Extract version info
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          else
            VERSION="0.0.0+dev.$(echo $GITHUB_SHA | cut -c1-7)"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build with Nuitka (Windows x64)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          python -m nuitka `
            --standalone `
            --onefile `
            --output-dir=dist `
            --output-filename=TaoBaoGoods-v${{ steps.version.outputs.VERSION }}-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.suffix }} `
            --company-name="TaoBaoGoods" `
            --product-name="TaoBaoGoods" `
            --file-version=${{ steps.version.outputs.VERSION }} `
            --product-version=${{ steps.version.outputs.VERSION }} `
            --file-description="淘宝自动购 深度防检测版" `
            --windows-console-mode=force `
            --enable-plugin=upx `
            --lto=yes `
            --jobs=auto `
            --assume-yes-for-downloads `
            main.py

      - name: Build with Nuitka (Linux x86_64)
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --output-dir=dist \
            --output-filename=TaoBaoGoods-v${{ steps.version.outputs.VERSION }}-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.suffix }} \
            --company-name="TaoBaoGoods" \
            --product-name="TaoBaoGoods" \
            --file-description="淘宝自动购 深度防检测版" \
            --enable-plugin=upx \
            --lto=yes \
            --jobs=auto \
            --assume-yes-for-downloads \
            main.py

      - name: Build with Nuitka (macOS Intel)
        if: matrix.os == 'macos-13'
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --output-dir=dist \
            --output-filename=TaoBaoGoods-v${{ steps.version.outputs.VERSION }}-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.suffix }} \
            --company-name="TaoBaoGoods" \
            --product-name="TaoBaoGoods" \
            --file-description="淘宝自动购 深度防检测版" \
            --lto=yes \
            --jobs=auto \
            --assume-yes-for-downloads \
            main.py

      - name: Build with Nuitka (macOS Apple Silicon)
        if: matrix.os == 'macos-latest' && matrix.arch == 'arm64'
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --output-dir=dist \
            --output-filename=TaoBaoGoods-v${{ steps.version.outputs.VERSION }}-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.suffix }} \
            --company-name="TaoBaoGoods" \
            --product-name="TaoBaoGoods" \
            --file-description="淘宝自动购 深度防检测版" \
            --macos-create-Universal-Binary=no \
            --lto=yes \
            --jobs=auto \
            --assume-yes-for-downloads \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaoBaoGoods-v${{ steps.version.outputs.VERSION }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/TaoBaoGoods-v${{ steps.version.outputs.VERSION }}-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.suffix }}
          retention-days: 30
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TaoBaoGoods-v${{ steps.version.outputs.VERSION }}-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.suffix }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-nightly:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create nightly release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly
          name: "Nightly Build (${{ github.sha }})"
          prerelease: true
          files: artifacts/*
          body: |
            ## 📦 Nightly Build - Multi-Architecture

            ### 🖥️ Supported Platforms

            | Platform | Architecture | File |
            |----------|-------------|------|
            | 🪟 Windows | x64 | `*-win-x64.exe` |
            | 🐧 Linux | x86_64 | `*-linux-x86_64` |
            | 🍎 macOS | Intel (x86_64) | `*-macos-x86_64` |
            | 🍎 macOS | Apple Silicon (arm64) | `*-macos-arm64` |

            ---

            **Commit:** `${{ github.sha }}`

            **Triggered by:** Push to `master` branch

            ---

            *这是自动生成的开发版本，可能包含未测试的功能*

            ### 🔧 Compatibility Notes

            - **Linux**: Compatible with Ubuntu 20.04+, Debian 11+, CentOS 8+, Fedora 36+, Arch Linux
            - **macOS**: Requires macOS 10.15+ (Catalina or later)
            - **Windows**: Requires Windows 10+ (64-bit only)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: [build]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Build summary
        run: |
          echo "## 📊 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ **Status:** SUCCESS" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Status:** FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Ref:** \`${{ github.ref }}\`" >> $GITHUB_STEP_SUMMARY
