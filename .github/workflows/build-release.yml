name: Build Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  release:
    types:
      - published

env:
  PYTHON_VERSION: "3.11"

jobs:
  build:
    environment: GITHUB_TOKEN
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            suffix: ".exe"
          - os: ubuntu-latest
            suffix: ""
          - os: macos-latest
            suffix: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          pip install nuitka==2.6.6
          pip install -r requirements.txt
          pip install selenium-stealth

      - name: Install dependencies (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          pip install nuitka==2.6.6
          pip install -r requirements.txt
          pip install selenium-stealth

      - name: Run unit tests
        shell: bash
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v

      - name: Get version tag (Windows)
        id: version_win
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $tag = $env:GITHUB_REF_NAME
          $version = $tag -replace "^v", ""
          "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Get version tag (Unix)
        id: version_unix
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          echo "VERSION=$version" >> "$GITHUB_OUTPUT"

      - name: Export version
        id: version
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            echo "VERSION=${{ steps.version_win.outputs.VERSION }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${{ steps.version_unix.outputs.VERSION }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Export platform name
        id: platform
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            echo "NAME=win" >> "$GITHUB_OUTPUT"
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            echo "NAME=linux" >> "$GITHUB_OUTPUT"
          else
            echo "NAME=macos" >> "$GITHUB_OUTPUT"
          fi

      - name: Build with nuitka (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          python -m nuitka `
            --standalone `
            --onefile `
            --output-filename=TaoBaoGoods-v${{ steps.version.outputs.VERSION }}-${{ steps.platform.outputs.NAME }}${{ matrix.suffix }} `
            --output-dir=dist `
            main.py

      - name: Build with nuitka (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --output-filename=TaoBaoGoods-v${{ steps.version.outputs.VERSION }}-${{ steps.platform.outputs.NAME }}${{ matrix.suffix }} \
            --output-dir=dist \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaoBaoGoods-v${{ steps.version.outputs.VERSION }}-${{ steps.platform.outputs.NAME }}
          path: dist/TaoBaoGoods-v${{ steps.version.outputs.VERSION }}-${{ steps.platform.outputs.NAME }}${{ matrix.suffix }}
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TaoBaoGoods-v${{ steps.version.outputs.VERSION }}-${{ steps.platform.outputs.NAME }}${{ matrix.suffix }}
        env:
          TOKEN: ${{ secrets.TOKEN }}
