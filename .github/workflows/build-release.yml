name: Build Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  release:
    types:
      - published

env:
  PYTHON_VERSION: "3.11"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            suffix: ".exe"
          - os: ubuntu-latest
            suffix: ""
          - os: macos-latest
            suffix: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install nuitka and dependencies
        run: |
          pip install nuitka==2.6.6 pyyaml selenium

      - name: Get version tag
        id: version
        run: |
          $tag = $env:GITHUB_REF_NAME
          $version = $tag -replace "^v", ""
          echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8

      - name: Build with nuitka standalone
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --enable-plugin=selenium \
            --output-filename=TaoBaoGoods-v$env:VERSION-${{ matrix.os == 'windows-latest' && 'win' || matrix.os == 'ubuntu-latest' && 'linux' || 'macos' }}${{ matrix.suffix }} \
            --output-dir=dist \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaoBaoGoods-v${{ steps.version.outputs.VERSION }}-${{ matrix.os == 'windows-latest' && 'win' || matrix.os == 'ubuntu-latest' && 'linux' || 'macos' }}
          path: dist/TaoBaoGoods-v${{ steps.version.outputs.VERSION }}-${{ matrix.os == 'windows-latest' && 'win' || matrix.os == 'ubuntu-latest' && 'linux' || 'macos' }}${{ matrix.suffix }}
          retention-days: 30
